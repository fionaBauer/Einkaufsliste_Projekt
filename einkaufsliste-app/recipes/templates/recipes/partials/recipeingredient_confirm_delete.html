<h2>Zutat löschen</h2>
<p>
    Möchtest du <strong>{{ recipe_ingredient.ingredient.name }}</strong>
    wirklich aus dem Rezept entfernen?
</p>

<form method="post" action="{{ request.path }}">
    {% csrf_token %}
    <div class="modal-actions">
        <button type="button" class="btn btn-secondary modal-close-btn">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Ja, löschen</button>
    </div>
</form>
