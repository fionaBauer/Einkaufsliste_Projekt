{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort geändert – Prepio</title>
    <link rel="stylesheet" href="{% static 'global/css/layout.css' %}?v=3">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-app); }
        .auth-card { background:white; border-radius:var(--radius-xl); box-shadow:var(--shadow-soft); padding:48px 40px; width:100%; max-width:400px; text-align:center; }
        .auth-brand h1 { margin:0 0 6px; font-size:26px; font-weight:700; color:var(--text-main); }
        .auth-message { font-size:15px; color:var(--text-main); line-height:1.6; margin-bottom:32px; }
        .auth-btn { display:inline-block; padding:13px 32px; background:#111111; color:white; border:none; border-radius:var(--radius-md); font-size:15px; font-weight:600; cursor:pointer; text-decoration:none; transition:background 0.15s; }
        .auth-btn:hover { background:#222222; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <h1>Prepio</h1>
        </div>
        <p class="auth-message">Dein Passwort wurde erfolgreich geändert.</p>
        <a href="{% url 'login' %}" class="auth-btn">Jetzt anmelden</a>
    </div>
</body>
</html>
