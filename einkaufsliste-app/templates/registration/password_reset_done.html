{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mail gesendet – Prepio</title>
    <link rel="stylesheet" href="{% static 'global/css/layout.css' %}?v=3">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-app); }
        .auth-card { background:white; border-radius:var(--radius-xl); box-shadow:var(--shadow-soft); padding:48px 40px; width:100%; max-width:400px; text-align:center; }
        .auth-brand h1 { margin:0 0 6px; font-size:26px; font-weight:700; color:var(--text-main); }
        .auth-brand p { margin:0 0 32px; font-size:13px; color:var(--text-muted); }
        .auth-message { font-size:15px; color:var(--text-main); line-height:1.6; margin-bottom:32px; }
        .auth-footer a { color:var(--text-main); font-weight:600; text-decoration:none; font-size:13px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <h1>Prepio</h1>
        </div>
        <p class="auth-message">
            Falls ein Konto mit dieser E-Mail existiert, haben wir dir einen Link zum Zurücksetzen des Passworts geschickt.
        </p>
        <a href="{% url 'login' %}">Zurück zur Anmeldung</a>
    </div>
</body>
</html>
