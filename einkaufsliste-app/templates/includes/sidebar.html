<aside class="sidebar">
    <div class="sidebar-inner">
        <div class="sidebar-brand">
            <h2 class="sidebar-title">Meal Planner</h2>
            <p class="sidebar-subtitle">Planen, kochen, organisieren</p>
        </div>

        <nav class="sidebar-nav">
            <a
                href="{% url 'home' %}"
                class="sidebar-link {% if request.path == '/' %}active{% endif %}">
                Home
            </a>
            <a
                href="{% url 'ingredients:list' %}"
                class="sidebar-link {% if '/ingredients' in request.path %}active{% endif %}">
                Zutaten
            </a>

            <a
                href="{% url 'recipes:recipe_list' %}"
                class="sidebar-link {% if '/recipes' in request.path %}active{% endif %}">
                Rezepte
            </a>

            <a
                href="{% url 'shopping:list' %}"
                class="sidebar-link {% if '/shopping' in request.path %}active{% endif %}">
                Einkaufsliste
            </a>

            <a
                href="{% url 'inventory:list' %}"
                class="sidebar-link {% if '/inventory' in request.path %}active{% endif %}">
                Inventar
            </a>
        </nav>
    </div>

    <div class="sidebar-footer">
        <span class="sidebar-user">{{ request.user.username }}</span>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="sidebar-logout">Abmelden</button>
        </form>
    </div>
</aside>
