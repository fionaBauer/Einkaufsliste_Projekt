<aside class="sidebar">
    <div class="sidebar-inner">
        <div class="sidebar-brand">
            <h2 class="sidebar-title">Prepio</h2>
            <p class="sidebar-subtitle">Planen, kochen, organisieren</p>
        </div>

        <nav class="sidebar-nav">
            <a
                href="{% url 'home' %}"
                class="sidebar-link {% if request.path == '/' %}active{% endif %}">
                Home
            </a>
            <a
                href="{% url 'ingredients:list' %}"
                class="sidebar-link {% if '/ingredients' in request.path %}active{% endif %}">
                Zutaten
            </a>

            <a
                href="{% url 'recipes:recipe_list' %}"
                class="sidebar-link {% if '/recipes' in request.path %}active{% endif %}">
                Rezepte
            </a>

            <a
                href="{% url 'shopping:list' %}"
                class="sidebar-link {% if '/shopping' in request.path %}active{% endif %}">
                Einkaufsliste
            </a>

            <a
                href="{% url 'inventory:list' %}"
                class="sidebar-link {% if '/inventory' in request.path %}active{% endif %}">
                Inventar
            </a>
        </nav>
    </div>

    <div class="sidebar-footer">
        <a href="{% url 'households:detail' %}" class="sidebar-household {% if '/households' in request.path %}active{% endif %}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;flex-shrink:0;">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            {{ request.user.households.first.name|default:"Haushalt" }}
        </a>
        <div class="sidebar-user-row">
            <span class="sidebar-user">{{ request.user.username }}</span>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="sidebar-logout">Abmelden</button>
            </form>
        </div>
    </div>
</aside>
